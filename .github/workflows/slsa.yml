name: SLSA Provenance

on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write
  id-token: write

jobs:
  generate-provenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          go build -v ./...

