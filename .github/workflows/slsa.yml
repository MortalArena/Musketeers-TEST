name: SLSA Provenance

on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write
  id-token: write

jobs:
  generate-provenance:
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v1.8.0
    with:
      go-version: '1.21'
